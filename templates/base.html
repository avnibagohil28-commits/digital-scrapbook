<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚡ Memory Scrapbook</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">📸 MemoryScrapbook</a>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('index') }}" class="nav-item">Timeline</a>
                <a href="/add_memory" class="nav-item">Drop Memory</a>
                <a href="/profile" class="nav-item nav-profile-btn">✨ @{{ current_user.username }}</a>
                <a href="{{ url_for('logout') }}" class="nav-item" style="color: #d63031;">Log Out</a>
            {% else %}
                <a href="/login" class="nav-item">Login</a>
                <a href="/signup" class="nav-item">Join</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
